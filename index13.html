<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wait... there's more!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #fdf5f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial Rounded MT Bold', sans-serif;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
        }

        h1 {
            color: #5d4037;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            min-height: 50px;
        }

        button {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* YES Button Styles */
        #yes-btn {
            background-color: #ef9a9a;
            color: white;
            box-shadow: 0 5px 15px rgba(239, 154, 154, 0.4);
        }

        /* NO Button Styles */
        #no-btn {
            background-color: #d7ccc8;
            color: #5d4037;
            position: relative; /* Normal jagah par rahega jab tak move na ho */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ur dakhni ha JAAAN....</h1>
        
        <div class="btn-group">
            <button id="yes-btn" onclick="nextPage()">YES</button>
            
            <button id="no-btn" onmouseover="moveButton()" onclick="moveButton()">NO</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('no-btn');
            
            // Ye buttons ko random screen par kahin bhi bhej dega
            // Humne thoda margin rakha hai taake button screen se bahar na jaye
            const x = Math.random() * (window.innerWidth - btn.clientWidth - 20);
            const y = Math.random() * (window.innerHeight - btn.clientHeight - 20);
            
            btn.style.position = 'fixed'; // Ab ye screen par kahin bhi ja sakta hai
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function nextPage() {
            // "YES" par click karne par index9.html par le jaye
            window.location.href = "index14.html"; 
        }
    </script>
</body>
</html>
