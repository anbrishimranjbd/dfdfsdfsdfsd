<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wait... there's more!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #fdf5f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial Rounded MT Bold', sans-serif;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
        }

        h1 {
            color: #5d4037;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            min-height: 50px;
        }

        button {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* YES Button Styles */
        #yes-btn {
            background-color: #ef9a9a;
            color: white;
            box-shadow: 0 5px 15px rgba(239, 154, 154, 0.4);
        }

        /* NO Button Styles */
        #no-btn {
            background-color: #d7ccc8;
            color: #5d4037;
            position: relative; /* Normal jagah par rahega jab tak move na ho */
        } .btn-next {margin-top: 20px;
            padding: 12px 40px;
            border: 2px solid #ff6b81;
            color: #ff6b81;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-next:hover {
            background: #ff6b81;
            color: white;
        }
    </style>
</head>
<body>
