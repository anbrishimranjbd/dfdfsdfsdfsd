<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Story ❤️</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #fff5f7;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        .content-card {
            background: white;
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            max-width: 500px;
            text-align: center;
            border: 1px solid #ffeef2;
        }

        h2 { color: #ff6b81; font-size: 2.2rem; margin-bottom: 20px; }

        .text {
            color: #555; line-height: 1.8;
            font-size: 1.1rem; margin-bottom: 35px;
        }

        .btn-next {
            padding: 12px 40px;
            border: 2px solid #ff6b81;
            color: #ff6b81;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-next:hover {
            background: #ff6b81;
            color: white;
        }
    </style>
</head>
<body>
    <div class="content-card">
        <h2>Message</h2>
        <div class="text">
            "Safar to asali tab shuru hua jab aap meri zindagi mein aaye. 
            Aapke sath guzara hua har lamha mere liye kisi tohfay se kam nahi."
            <br><br>
            I really love you koja bandar...
        </div>
        <a href="index3.html" class="btn-next">Next ➔</a>
    </div>
</body>
</html>
